<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <img src="/images/logo-header.png" alt="MindMatters" class="logo-img">
    </a>
    <nav class="main-nav">
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if strings.HasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
