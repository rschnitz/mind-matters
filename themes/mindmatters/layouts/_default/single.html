{{ define "main" }}
<article class="article-single">
  <div class="container">
    <header class="article-header">
      <div class="article-meta">
        {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time>{{ end }}
        {{ with .ReadingTime }}<span class="reading-time">{{ . }} min read</span>{{ end }}
      </div>
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}<p class="article-description">{{ . }}</p>{{ end }}
    </header>

    {{ with .Params.audio }}
    <div class="audio-player">
      <h3>Listen to this episode</h3>
      <audio controls preload="metadata">
        <source src="{{ . }}" type="audio/mpeg">
      </audio>
    </div>
    {{ end }}

    <div class="article-body">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
