{{ define "main" }}
<article class="article-single">
  {{ with .Params.image }}
  <img class="article-hero-image" src="{{ . }}" alt="{{ $.Title }}">
  {{ end }}
  <div class="container">
    <div class="article-meta">
      <span>Leo Sachs</span>
      {{ with .Date }}<time datetime="{{ .Format "2025-10-02" }}">{{ .Format "October 2, 2025" }}</time>{{ end }}
      {{ with .ReadingTime }}<span>{{ . }} min read</span>{{ end }}
    </div>
    <h1>{{ .Title }}</h1>

    {{ with .Params.audio }}
    <div class="audio-player">
      <p>Listen to this episode</p>
      <audio controls preload="metadata">
        <source src="{{ . }}" type="audio/mpeg">
      </audio>
    </div>
    {{ end }}

    <div class="article-body">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
