{{ define "main" }}
<section class="list-page">
  <div class="container">
    <h1 class="list-page-heading">All Posts</h1>
    <div class="featured-list">
      {{ range (where .Pages "Params.podcast_only" "!=" true).ByDate.Reverse }}
      <div class="featured-item">
        {{ with .Params.image }}
        <div class="featured-image">
          <a href="{{ $.RelPermalink }}"><img src="{{ . }}" alt="{{ $.Title }}" loading="lazy"></a>
        </div>
        {{ end }}
        <div class="featured-content">
          <div class="list-item-meta">
            <span class="author-avatar">LS</span>
            <span>Leo Sachs</span>
            <span class="list-item-date">{{ .Date.Format "Oct 2, 2025" }}</span>∫
          </div>
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Summary | truncate 180 }}</p>
          <a href="{{ .RelPermalink }}" class="btn-read">Read</a>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
